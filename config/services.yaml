# This file is the entry point to configure your own services.

parameters:
    # TRYB / Boomerangme Marketplace
    marketplace_api_base_url: '%env(MARKETPLACE_API_BASE_URI)%'
    marketplace_api_app_token: '%env(MARKETPLACE_API_APP_TOKEN)%'
    marketplace_api_resolve_credentials_cache_ttl: '%env(default::MARKETPLACE_API_CREDENTIAL_CACHE_TTL)%'

    # Zelty POS
    zelty_api_base_url: '%env(ZELTY_API_BASE_URI)%'

    # Public URL of THIS app (used when registering the Zelty webhook)
    app_public_url: '%env(APP_PUBLIC_URL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Services that need the project dir (for file-based storage)
    App\Service\MerchantSecretStore:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\MerchantCredentialStore:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\IdempotencyStore:
        arguments:
            $projectDir: '%kernel.project_dir%'
